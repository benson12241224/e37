<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Circle Calculator</title>
</head>
<body>
  <h1>Circle Calculator</h1>

  <label>Radius: <input type="number" id="radius" value="5"></label>
  <button onclick="calculate()">Calculate</button>

  <p id="circumferenceResult"></p>
  <p id="areaResult"></p>

<script>
  function calcCircumfrence(radius) {
    const circumference = 2 * Math.PI * radius;
    return "The circumference is " + circumference.toFixed(2);
  }

  function calcArea(radius) {
    const area = Math.PI * radius * radius;
    return "The area is " + area.toFixed(2);
  }

  function calculate() {
    const radius = parseFloat(document.getElementById("radius").value);
    document.getElementById("circumferenceResult").textContent = calcCircumfrence(radius);
    document.getElementById("areaResult").textContent = calcArea(radius);
  }

  calculate();
</script>
</body>
</html>
